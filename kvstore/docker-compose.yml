version: '3.8'

services:
  n1:
    build: .
    command:
      - -id
      - n1
      - -api
      - 0.0.0.0:8001
      - -raft
      - 0.0.0.0:9001
      - -data
      - /data
      - -peers
      - n2=http://n2:9002,n3=http://n3:9003
    ports:
      - "8001:8001"
      - "9001:9001"
    volumes:
      - n1-data:/data
    restart: unless-stopped
    depends_on:
      - n2
      - n3

  n2:
    build: .
    command:
      - -id
      - n2
      - -api
      - 0.0.0.0:8002
      - -raft
      - 0.0.0.0:9002
      - -data
      - /data
      - -peers
      - n1=http://n1:9001,n3=http://n3:9003
    ports:
      - "8002:8002"
      - "9002:9002"
    volumes:
      - n2-data:/data
    restart: unless-stopped

  n3:
    build: .
    command:
      - -id
      - n3
      - -api
      - 0.0.0.0:8003
      - -raft
      - 0.0.0.0:9003
      - -data
      - /data
      - -peers
      - n1=http://n1:9001,n2=http://n2:9002
    ports:
      - "8003:8003"
      - "9003:9003"
    volumes:
      - n3-data:/data
    restart: unless-stopped

volumes:
  n1-data:
  n2-data:
  n3-data:
